  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#2e7d32" stroke-width="1.5" opacity="0.6"/>

  <!-- Leaf body (matching Navbar LeafIcon shape, scaled to 64x64) -->
  <path
    d="M14 52 C14 52 18 34 36 25 C48 20 48 20 48 20 C48 20 44 38 26 47 C21 50 14 52 14 52Z"
